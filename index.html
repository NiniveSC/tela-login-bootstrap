<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <main>
        <div class="card shadow-lg p-4 rounded-4">
            <h2 id="titulo" class="text-primary">Login</h2>
            <form id="formLogin">
                <div id="divEmail" class="mb-3">
                    <label for="email">Email:</label>
                    <input for="email" id="email" placeholder="Email" class="form-control" required>
                </div>
                <div id="divSenha" class="mb-3">
                    <label for="senha">Senha:</label>
                    <input for="password" id="senha" placeholder="Senha" class="form-control" required>
                </div>
                <button id="botaoEnvio" type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
                <p>Não tem conta? Cadastre-se!</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
